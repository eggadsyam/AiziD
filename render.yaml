services:
  - type: web
    name: gabungin-api
    env: python
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: gabungin-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: gabungin-db
    region: singapore
    databaseName: gabungin
    user: gabungin_user
