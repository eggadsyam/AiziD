<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Outer Rounded Diamond -->
    <rect x="20" y="20" width="60" height="60" rx="12" ry="12" transform="rotate(45 50 50)" fill="#0b1a27" stroke="#ffffff" stroke-width="4.5"/>
    
    <!-- Top Yellow Triangle -->
    <polygon points="50,26 42,39 58,39" fill="#fcc419"/>
    
    <!-- Bottom Yellow Triangle -->
